[pytest]
# pytest 配置文件

# 測試目錄
testpaths = tests

# 測試文件模式
python_files = test_*.py *_test.py

# 測試類模式
python_classes = Test*

# 測試函數模式
python_functions = test_*

# 輸出選項
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=app
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=80
    --maxfail=3
    --disable-warnings
    --durations=10
    --strict-config

# 標記定義
markers =
    unit: 單元測試
    integration: 整合測試
    slow: 慢速測試
    requires_neo4j: 需要 Neo4j 的測試
    requires_opensearch: 需要 OpenSearch 的測試
    requires_llm: 需要 LLM API 的測試
    mock: 使用 Mock 的測試
    performance: 效能測試
    security: 安全相關測試

# 異步測試配置
asyncio_mode = auto

# 日誌配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 測試發現配置
pythonpath = .

# 覆蓋率配置
[coverage:run]
source = app
omit = 
    */tests/*
    */test_*
    */__pycache__/*
    */venv/*
    */virtualenv/*
    */migrations/*
    */alembic/*
    */scripts/*
    */docs/*
    setup.py
    manage.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    class .*Error\(.*\):
    def .*Error\(.*\):
    pass
    raise .*Error
    logger\.
    print\(
    # type: ignore
    # noqa

# 覆蓋率門檻配置
[coverage:report:fail_under]
total = 80
missing = 0

# 測試分類配置
[tool:pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

# 測試執行配置
addopts = 
    --strict-markers
    --strict-config
    --disable-warnings
    --tb=short
    --durations=10
    --maxfail=3
    --cov=app
    --cov-report=html:htmlcov
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=80
    --cov-branch
    --cov-config=.coveragerc

# 測試標記配置
markers =
    unit: 單元測試（快速執行）
    integration: 整合測試（需要外部服務）
    slow: 慢速測試（執行時間 > 5秒）
    mock: 使用 Mock 的測試
    performance: 效能測試
    security: 安全相關測試
    requires_neo4j: 需要 Neo4j 資料庫
    requires_opensearch: 需要 OpenSearch 服務
    requires_llm: 需要 LLM API 服務
    requires_api_key: 需要 API 金鑰
    smoke: 冒煙測試
    regression: 回歸測試